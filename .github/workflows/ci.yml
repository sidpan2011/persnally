name: persnallyd

# The v2 product. Runs only when the package changes.
on:
  push:
    branches: [main, dev]
    paths: ["persnallyd/**", ".github/workflows/ci.yml"]
  pull_request:
    branches: [main, dev]
    paths: ["persnallyd/**", ".github/workflows/ci.yml"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  persnallyd:
    name: persnallyd — Type Check, Build, Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: persnallyd

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: persnallyd/package-lock.json

      - run: npm ci

      - name: Build (tsc strict) + test (incl. MCP protocol e2e)
        run: npm test
