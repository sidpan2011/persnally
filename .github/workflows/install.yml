name: Install smoke

# Proves the PUBLISHED artifact installs and runs on a clean machine across
# OS/arch/Node — catches the native-module (better-sqlite3) breakage class
# before users do. Heavy (macOS/Windows minutes), so it runs only when the
# package itself changes.
on:
  push:
    branches: [main, dev]
    paths: ["persnallyd/**", ".github/workflows/install.yml"]
  pull_request:
    branches: [main, dev]
    paths: ["persnallyd/**", ".github/workflows/install.yml"]

concurrency:
  group: install-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: Install · ${{ matrix.os }} · Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # one platform failing must not hide the others
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    defaults:
      run:
        shell: bash # one script across Linux/macOS/Windows runners
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: persnallyd/package-lock.json

      - name: Build the publish artifact (tarball)
        working-directory: persnallyd
        run: |
          npm ci
          npm run build
          # Match what `npm publish` ships: prepublishOnly copies these in.
          cp ../README.md ../LICENSE .
          npm pack

      - name: Install the tarball globally (clean, production deps only)
        working-directory: persnallyd
        run: npm install -g ./persnally-*.tgz

      - name: Smoke — bins resolve, native SQLite loads, store initializes
        run: |
          set -euo pipefail
          # All three bins must be on PATH (don't execute persnally-mcp — it's a
          # stdio server and would block waiting on input).
          command -v persnally persnallyd persnally-mcp
          # Running the CLI imports better-sqlite3 — if the native binary is broken
          # for this OS/arch/Node, this line crashes at import.
          persnallyd | head -1
          # init opens/creates the DB → exercises the native module end to end.
          DIR="$(mktemp -d)"
          PERSNALLY_DIR="$DIR" persnallyd init
          PERSNALLY_DIR="$DIR" persnallyd status
