name: Web

# Marketing site. Vercel already builds + deploys every PR, so CI only adds
# the lint gate Vercel doesn't run. Triggers only on web changes.
on:
  push:
    branches: [main, dev]
    paths: ["web/**", ".github/workflows/web.yml"]
  pull_request:
    branches: [main, dev]
    paths: ["web/**", ".github/workflows/web.yml"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web — Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: ESLint
        run: npm run lint
